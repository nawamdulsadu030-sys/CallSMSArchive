plugins {
    id 'com.android.application'
}

android {
    compileSdk 33
    namespace 'com.nowa.callsmsarchive'

    defaultConfig {
        applicationId "com.nowa.callsmsarchive"
        minSdk 26
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
